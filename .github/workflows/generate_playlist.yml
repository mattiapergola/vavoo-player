name: Generate Playlist

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate Playlist and EPG
        run: |
          python generate_playlist.py --output playlist.m3u8 --epg-output epg.xml

      - name: Generate Playlist
        run: |
          python generate_playlist.py --output playlist.m3u8

      - name: Commit and Push playlist.m3u8
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add playlist.m3u8

          if git diff --cached --quiet; then
            echo "No changes to playlist.m3u8"
          else
            git commit -m "Auto-update playlist.m3u8 [skip ci]"
            git pull --rebase --autostash origin master
            git push
          fi

      - name: Generate playlist.m3u via proxy
        run: |
          RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/master/playlist.m3u8"
          curl -fsSL "https://vavooproxy.dpdns.org/playlist?url=${RAW_URL}" -o playlist.m3u

      - name: Commit and Push playlist.m3u
        run: |
          git add playlist.m3u

          if git diff --cached --quiet; then
            echo "No changes to playlist.m3u"
            exit 0
          fi

          git commit -m "Auto-update playlist.m3u [skip ci]"
          git pull --rebase --autostash origin master
          git push
